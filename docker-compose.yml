services:
  api:
    build: .
    container_name: dean_office_api
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - .:/app_code
      - db_data:/app_code/data
    environment:
      - PYTHONUNBUFFERED=1
      - JWT_SECRET_KEY=my-dev-secret-key-32-chars-long!!
      - ENCRYPTION_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      - PORT=8000
    restart: unless-stopped

volumes:
  db_data:
